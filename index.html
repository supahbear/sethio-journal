<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sethio Journal</title>
    
    <!-- CSS files -->
    <link href="base.css" rel="stylesheet" type="text/css" />
    <link href="components.css" rel="stylesheet" type="text/css" />
    <link href="modals.css" rel="stylesheet" type="text/css" />
    <link href="utilities.css" rel="stylesheet" type="text/css" />
    <link href="responsive.css" rel="stylesheet" type="text/css" />
    <link href="breach-theme.css" rel="stylesheet" type="text/css" />

    <!-- Handwriting font for margin notes -->
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <h1 class="logo-fallback">Sethio Journal</h1>
            </div>
        </header>

        <main>
            <section class="journal-landing">
                <div class="journal-nav-buttons">
                    <button class="hub-action-btn" id="journalBtn">Journal</button>
                    <button class="hub-action-btn" id="galleryBtn">Gallery</button>
                </div>
            </section>
        </main>
    </div>

    <!-- ===== JOURNAL MODAL ===== -->
    <div id="journalModalOverlay" class="modal-overlay">
        <div class="journal-modal" id="journalModal">
            <div class="journal-modal-content">
                <div class="modal-header journal-modal-header">
                    <h2>Campaign Log</h2>
                    <button class="close-btn" id="closeJournalBtn">&times;</button>
                </div>
                <div class="journal-body" id="journalTabCampaignLog"></div>
            </div>
        </div>
    </div>


    <!-- ===== GALLERY MODAL ===== -->
    <div id="galleryModalOverlay" class="modal-overlay">
        <div class="gallery-modal" id="galleryModal">
            <div class="gallery-modal-content">
                <div class="modal-header gallery-modal-header">
                    <h2>Gallery</h2>
                    <button class="gallery-add-btn" id="galleryAddBtn">+ Add Image</button>
                    <button class="close-btn" id="closeGalleryBtn">&times;</button>
                </div>
                <!-- Add / Edit form (hidden by default) -->
                <div class="gallery-form-area" id="galleryFormArea" style="display:none;">
                    <div class="gallery-form-row-fields">
                        <input type="url" class="gallery-input gallery-input-url" id="galleryFormUrl" placeholder="Image URL" autocomplete="off">
                        <input type="text" class="gallery-input gallery-input-title" id="galleryFormTitle" placeholder="Title">
                        <input type="text" class="gallery-input gallery-input-artist" id="galleryFormArtist" placeholder="Artist (optional)">
                        <textarea class="gallery-input gallery-textarea" id="galleryFormDescription" placeholder="Description (optional)"></textarea>
                    </div>
                    <div class="gallery-form-actions">
                        <button class="gallery-btn gallery-btn-save" id="galleryFormSaveBtn">Save</button>
                        <button class="gallery-btn gallery-btn-cancel" id="galleryFormCancelBtn">Cancel</button>
                        <span class="gallery-form-status" id="galleryFormStatus"></span>
                    </div>
                </div>
                <!-- Gallery grid -->
                <div class="gallery-body" id="galleryBody">
                    <div class="gallery-loading" id="galleryLoadingMsg">Loading gallery…</div>
                    <div class="gallery-grid" id="galleryGrid" style="display:none;"></div>
                    <div class="gallery-empty" id="galleryEmptyMsg" style="display:none;">No images yet. Add one above!</div>
                </div>
                <!-- Lightbox layer (covers the modal when an image is clicked) -->
                <div class="gallery-lightbox" id="galleryLightbox" style="display:none;">
                    <button class="gallery-lightbox-back" id="galleryLightboxBack">← Back</button>
                    <button class="gallery-lightbox-edit" id="galleryLightboxEdit" title="Edit">&#9998;</button>
                    <button class="gallery-lightbox-delete" id="galleryLightboxDelete" title="Delete">&times;</button>
                    <img class="gallery-lightbox-img" id="galleryLightboxImg" src="" alt="">
                    <div class="gallery-lightbox-info" id="galleryLightboxInfo"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript files -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
